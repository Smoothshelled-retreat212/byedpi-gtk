name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build gettext desktop-file-utils \
            libgtk-4-dev libadwaita-1-dev python3-gi

      - name: Configure
        run: meson setup build --prefix=/usr

      - name: Compile
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

      - name: Byte-compile modules
        run: python3 -m compileall src/byedpi_gtk

      - name: Import every module from a clean install
        run: |
          meson install -C build --destdir "$PWD/staging"
          MODDIR=$(find "$PWD/staging" -type d -name byedpi_gtk | head -1)
          python3 - "$MODDIR" <<'PY'
          import importlib, os, sys
          moddir = sys.argv[1]
          sys.path.insert(0, os.path.dirname(moddir))
          import gettext
          gettext.install('byedpi-gtk')
          import gi
          gi.require_version('Gtk', '4.0')
          gi.require_version('Adw', '1')
          names = [f[:-3] for f in os.listdir(moddir)
                   if f.endswith('.py') and f != '__init__.py']
          for name in sorted(names):
              importlib.import_module('byedpi_gtk.' + name)
          print('imported:', ', '.join(sorted(names)))
          PY

  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install validators
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream desktop-file-utils gettext

      - name: Validate metainfo
        run: |
          sed 's/@BINDIR@//g' \
            data/io.github.duckesteles.byedpigtk.metainfo.xml.in > /tmp/meta.xml
          appstreamcli validate --no-net --explain /tmp/meta.xml || true

      - name: Check translations
        run: |
          for po in po/*.po; do
            msgfmt -c -o /dev/null "$po"
          done
